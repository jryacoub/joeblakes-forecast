<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Joe Blake's West One</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:13px}
.topbar{background:#3D4A35;color:#EDE0CC;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:13px;font-weight:500;letter-spacing:0.04em}
.wk{font-size:11px;opacity:0.7}
.wrap{max-width:1100px;margin:0 auto;padding:20px 16px}
.weekbar{display:flex;align-items:center;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.weekbar label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.05em}
.weekbar select{font-size:13px;padding:6px 10px;border-radius:6px;border:0.5px solid #ccc;background:#fff;font-family:inherit;cursor:pointer}
.section{margin-bottom:28px}
.section-title{font-size:11px;font-weight:500;color:#EDE0CC;background:#3D4A35;padding:6px 12px;border-radius:6px 6px 0 0;text-transform:uppercase;letter-spacing:0.08em}
.tbl-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;background:#fff;border:0.5px solid #e0ddd5;font-size:12px}
th{font-size:10px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.04em;padding:6px 10px;text-align:center;border-bottom:0.5px solid #e8e5dd;background:#faf9f6;white-space:nowrap}
th.sku{text-align:left;min-width:130px}
th.day{background:#f0ede5;color:#3D4A35;font-weight:600}
td{padding:6px 10px;border-bottom:0.5px solid #f0ede5;text-align:center}
td.sku{text-align:left;font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf9f6}
.pos{color:#3a6910;font-weight:600}
.neg{color:#a02c2c;font-weight:600}
.ld{text-align:center;padding:2rem;color:#888}
</style>
</head>
<body>
<div class="topbar">
  <h1>JOE BLAKE'S &middot; WEST ONE &middot; ORDER INTELLIGENCE</h1>
  <span class="wk" id="wk"></span>
</div>
<div class="wrap">
  <div class="weekbar">
    <label>Week</label>
    <select id="week-pick" onchange="load()"></select>
  </div>
  <div id="content" class="ld">Loading...</div>
</div>
<script>
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnaW56eG9iaW5ycWRkYmJ1ZW51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NDk1NzEsImV4cCI6MjA4NzQyNTU3MX0.GXsPlQN0oG7BcJHm-_-1vTHoIf84IF5lghYoOg-_7CQ';
var BASE='https://uginzxobinrqddbbuenu.supabase.co/rest/v1';
var H={apikey:KEY,Authorization:'Bearer '+KEY};
var DAYS=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
var DOUGHNUTS=['Nutella','Pistachio','Kinder Bueno','Red Velvet','Vegan Jam','Glazed','Custard','Vegan Lotus','Pink Sprinkle','Chocolate Glazed','Chocolate Sprinkle','Double Chocolate','Tiramisu','Cinnamon Sugar','Honeycomb','Lemon','Jaffa Cake','Cinnamon Bun'];
var PASTRIES=['Almond Croissant','Plain Croissant','Plain Nata','Pain Au Chocolat','Pain Aux Raisin','Raspberry Nata'];

async function get(path){
  try{var r=await fetch(BASE+path,{headers:H});return await r.json();}
  catch(e){return [];}
}

function getMonday(d){var dt=new Date(d);dt.setDate(dt.getDate()-((dt.getDay()+6)%7));return dt.toISOString().split('T')[0];}
function addDays(d,n){var dt=new Date(d);dt.setDate(dt.getDate()+n);return dt.toISOString().split('T')[0];}
function fmtShort(d){return new Date(d+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});}

function init(){
  var today=new Date().toISOString().split('T')[0];
  var thisMonday=getMonday(today);
  var sel=document.getElementById('week-pick');
  var weeks=[addDays(thisMonday,14),addDays(thisMonday,7),thisMonday];
  for(var i=1;i<=12;i++) weeks.push(addDays(thisMonday,i*-7));
  weeks.forEach(function(w){
    var opt=document.createElement('option');
    opt.value=w;
    var end=addDays(w,6);
    var label=fmtShort(w)+' \u2013 '+fmtShort(end);
    if(w===thisMonday) label='This week: '+label;
    else if(w===addDays(thisMonday,-7)) label='Last week: '+label;
    else if(w===addDays(thisMonday,7)) label='Next week: '+label;
    opt.textContent=label;
    if(w===addDays(thisMonday,-7)) opt.selected=true;
    sel.appendChild(opt);
  });
  load();
}

async function load(){
  var monday=document.getElementById('week-pick').value;
  if(!monday)return;
  document.getElementById('content').innerHTML='<div class="ld">Loading...</div>';
  var today=new Date().toISOString().split('T')[0];
  var sunday=addDays(monday,6);
  document.getElementById('wk').textContent='w/c '+fmtShort(monday)+' \u2013 '+fmtShort(sunday);

  var orders=await get('/jb_orders?select=sku,qty,date&date=gte.'+monday+'&date=lte.'+sunday+'&limit=1000');
  var sales=await get('/jb_sales?select=sku,qty,date&date=gte.'+monday+'&date=lte.'+sunday+'&limit=1000');
  var recs=await get('/jb_forecast?select=sku,dow,rec_edify&limit=1000');

  var oMap={},sMap={},rMap={};
  orders.forEach(function(r){if(!oMap[r.sku])oMap[r.sku]={};oMap[r.sku][r.date]=parseInt(r.qty);});
  sales.forEach(function(r){if(!sMap[r.sku])sMap[r.sku]={};sMap[r.sku][r.date]=parseInt(r.qty);});
  recs.forEach(function(r){if(!rMap[r.sku])rMap[r.sku]={};rMap[r.sku][r.dow]=parseInt(r.rec_edify);});

  var allSkus=Object.keys(Object.assign({},oMap,rMap));
  var dSkus=allSkus.filter(function(s){return DOUGHNUTS.indexOf(s)>-1;}).sort();
  var pSkus=allSkus.filter(function(s){return PASTRIES.indexOf(s)>-1;}).sort();

  if(!allSkus.length){
    document.getElementById('content').innerHTML='<div class="ld">No data for this week</div>';
    return;
  }

  function buildSection(title,skus){
    if(!skus.length)return '';
    var dayHeaders=DAYS.map(function(day,i){
      var date=addDays(monday,i);
      var isPast=date<today;
      return '<th class="day" colspan="'+(isPast?4:1)+'">'+day.slice(0,3)+' '+fmtShort(date)+'</th>';
    }).join('');
    var subHeaders=DAYS.map(function(day,i){
      var date=addDays(monday,i);
      var isPast=date<today;
      return isPast?'<th>Ord</th><th>Sold</th><th>Rec</th><th>&#916;</th>':'<th>Rec</th>';
    }).join('');
    var rows=skus.map(function(sku){
      var cells=DAYS.map(function(day,i){
        var date=addDays(monday,i);
        var isPast=date<today;
        var ord=(oMap[sku]&&oMap[sku][date]!==undefined)?oMap[sku][date]:'-';
        var sol=(sMap[sku]&&sMap[sku][date]!==undefined)?sMap[sku][date]:'-';
        var rec=(rMap[sku]&&rMap[sku][day]!==undefined)?rMap[sku][day]:'-';
        if(isPast){
          var delta=(rec!=='-'&&ord!=='-')?(parseInt(ord)-parseInt(rec)):null;
          var dc=delta===null?'':delta>0?' class="pos"':delta<0?' class="neg"':'';
          var ds=delta===null?'-':delta>0?'+'+delta:String(delta);
          return '<td>'+ord+'</td><td>'+sol+'</td><td>'+rec+'</td><td'+dc+'>'+ds+'</td>';
        }else{
          return '<td><strong>'+(rec!=='-'?rec:'-')+'</strong></td>';
        }
      }).join('');
      return '<tr><td class="sku">'+sku+'</td>'+cells+'</tr>';
    }).join('');
    return '<div class="section"><div class="section-title">'+title+'</div><div class="tbl-wrap"><table><thead><tr><th class="sku">SKU</th>'+dayHeaders+'</tr><tr><th></th>'+subHeaders+'</tr></thead><tbody>'+rows+'</tbody></table></div></div>';
  }

  document.getElementById('content').innerHTML=buildSection('DOUGHNUTS \u2014 RED ROSE',dSkus)+buildSection('PASTRIES \u2014 GALETA',pSkus);
}

init();
</script>
</body>
</html>
