<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Joe Blake's West One</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:14px}
.topbar{background:#3D4A35;color:#EDE0CC;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:13px;font-weight:500;letter-spacing:0.04em}
.wk{font-size:11px;opacity:0.7}
.wrap{max-width:820px;margin:0 auto;padding:20px 16px}
.datebar{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.datebar label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.05em}
.datebar select{font-size:13px;padding:6px 10px;border-radius:6px;border:0.5px solid #ccc;background:#fff;font-family:inherit;cursor:pointer}
.section{margin-bottom:24px}
.section-title{font-size:11px;font-weight:500;color:#EDE0CC;background:#3D4A35;padding:6px 12px;border-radius:6px 6px 0 0;text-transform:uppercase;letter-spacing:0.08em}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:0 0 8px 8px;overflow:hidden;border:0.5px solid #e0ddd5}
th{font-size:10px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.05em;padding:7px 12px;text-align:right;border-bottom:0.5px solid #e8e5dd;background:#faf9f6}
th:first-child{text-align:left}
td{padding:7px 12px;border-bottom:0.5px solid #f0ede5;text-align:right}
td:first-child{text-align:left;font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf9f6}
.pos{color:#3a6910;font-weight:600}
.neg{color:#a02c2c;font-weight:600}
.ld{text-align:center;padding:2rem;color:#888}
</style>
</head>
<body>
<div class="topbar">
  <h1>JOE BLAKE'S &middot; WEST ONE &middot; ORDER INTELLIGENCE</h1>
  <span class="wk" id="wk"></span>
</div>
<div class="wrap">
  <div class="datebar">
    <label>Date</label>
    <select id="date-pick" onchange="load()"></select>
  </div>
  <div id="content" class="ld">Loading...</div>
</div>
<script>
var KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVnaW56eG9iaW5ycWRkYmJ1ZW51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE4NDk1NzEsImV4cCI6MjA4NzQyNTU3MX0.GXsPlQN0oG7BcJHm-_-1vTHoIf84IF5lghYoOg-_7CQ';
var BASE='https://uginzxobinrqddbbuenu.supabase.co/rest/v1';
var H={apikey:KEY,Authorization:'Bearer '+KEY};
var DOUGHNUTS=['Nutella','Pistachio','Kinder Bueno','Red Velvet','Vegan Jam','Glazed','Custard','Vegan Lotus','Pink Sprinkle','Chocolate Glazed','Chocolate Sprinkle','Double Chocolate','Tiramisu','Cinnamon Sugar','Honeycomb','Lemon','Jaffa Cake','Cinnamon Bun'];
var PASTRIES=['Almond Croissant','Plain Croissant','Plain Nata','Pain Au Chocolat','Pain Aux Raisin','Raspberry Nata'];

async function get(path){var r=await fetch(BASE+path,{headers:H});return r.json();}

async function init(){
  var rows=await get('/jb_orders?select=date&order=date.desc&limit=200');
  var dates=[...new Set(rows.map(function(r){return r.date;}))].slice(0,28);
  var sel=document.getElementById('date-pick');
  dates.forEach(function(d){
    var opt=document.createElement('option');
    opt.value=d;
    opt.textContent=new Date(d).toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short',year:'numeric'});
    sel.appendChild(opt);
  });
  load();
}

async function load(){
  var date=document.getElementById('date-pick').value;
  if(!date)return;
  document.getElementById('content').innerHTML='<div class="ld">Loading...</div>';
  var dow=new Date(date).toLocaleDateString('en-US',{weekday:'long'});
  var orders=await get('/jb_orders?select=sku,qty&date=eq.'+date);
  var sales=await get('/jb_sales?select=sku,qty&date=eq.'+date);
  var recs=await get('/jb_forecast?select=sku,rec_edify&dow=eq.'+dow);
  var oMap={},sMap={},rMap={};
  orders.forEach(function(r){oMap[r.sku]=parseInt(r.qty);});
  sales.forEach(function(r){sMap[r.sku]=parseInt(r.qty);});
  recs.forEach(function(r){rMap[r.sku]=parseInt(r.rec_edify);});
  var allSkus=Object.keys(oMap);
  var dSkus=allSkus.filter(function(s){return DOUGHNUTS.indexOf(s)>-1;}).sort();
  var pSkus=allSkus.filter(function(s){return PASTRIES.indexOf(s)>-1;}).sort();
  document.getElementById('wk').textContent=new Date(date).toLocaleDateString('en-GB',{weekday:'long',day:'numeric',month:'long',year:'numeric'});
  document.getElementById('content').innerHTML=buildSection('DOUGHNUTS — RED ROSE',dSkus,oMap,sMap,rMap)+buildSection('PASTRIES — GALETA',pSkus,oMap,sMap,rMap);
}

function buildSection(title,skus,oMap,sMap,rMap){
  if(!skus.length)return '';
  var rows=skus.map(function(sku){
    var ord=oMap[sku]||0;
    var sol=sMap[sku]!==undefined?sMap[sku]:'-';
    var rec=rMap[sku]!==undefined?rMap[sku]:'-';
    var delta=(rec!=='-'&&ord)?(ord-rec):null;
    var dc=delta===null?'':delta>0?' class="pos"':delta<0?' class="neg"':'';
    var ds=delta===null?'-':delta>0?'+'+delta:String(delta);
    return '<tr><td>'+sku+'</td><td>'+ord+'</td><td>'+sol+'</td><td>'+rec+'</td><td'+dc+'>'+ds+'</td></tr>';
  }).join('');
  return '<div class="section"><div class="section-title">'+title+'</div><table><thead><tr><th>SKU</th><th>Ordered</th><th>Sold</th><th>Model rec</th><th>Delta</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
}

init();
</script>
</body>
</html>
