<title>Joe Blake's West One</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#1a1a1a;font-size:14px}
.topbar{background:#3D4A35;color:#EDE0CC;padding:12px 20px;display:flex;align-items:center;justify-content:space-between}
.topbar h1{font-size:13px;font-weight:500;letter-spacing:0.04em}
.wk{font-size:11px;opacity:0.7}
.wrap{max-width:820px;margin:0 auto;padding:20px 16px}
.datebar{display:flex;align-items:center;gap:10px;margin-bottom:20px}
.datebar label{font-size:11px;color:#888;text-transform:uppercase;letter-spacing:0.05em}
.datebar select{font-size:13px;padding:6px 10px;border-radius:6px;border:0.5px solid #ccc;background:#fff;font-family:inherit;cursor:pointer}
.section{margin-bottom:24px}
.section-title{font-size:11px;font-weight:500;color:#EDE0CC;background:#3D4A35;padding:6px 12px;border-radius:6px 6px 0 0;text-transform:uppercase;letter-spacing:0.08em}
table{width:100%;border-collapse:collapse;background:#fff;border-radius:0 0 8px 8px;overflow:hidden;border:0.5px solid #e0ddd5}
th{font-size:10px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.05em;padding:7px 12px;text-align:right;border-bottom:0.5px solid #e8e5dd;background:#faf9f6}
th:first-child{text-align:left}
td{padding:7px 12px;border-bottom:0.5px solid #f0ede5;text-align:right}
td:first-child{text-align:left;font-weight:500}
tr:last-child td{border-bottom:none}
tr:hover td{background:#faf9f6}
.pos{color:#3a6910;font-weight:600}
.neg{color:#a02c2c;font-weight:600}
.ld{text-align:center;padding:2rem;color:#888}
</style>
</head>
